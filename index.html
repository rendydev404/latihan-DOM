<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Mini Ecommerce | Rendi Irawan</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        /* CSS Variables for Violet Theme & Premium Look */
        :root {
            --primary-violet: #5d17ff;       /* Violet-500 */
            --primary-violet-hover: #4a09b9; /* Violet-600 */
            --primary-violet-light: #EDE9FE; /* Violet-100 */
            
            --bg-color: #F9FAFB;             /* Gray-50 */
            --surface-color: #FFFFFF;
            
            --text-main: #111827;            /* Gray-900 */
            --text-muted: #6B7280;           /* Gray-500 */
            
            --border-color: #E5E7EB;         /* Gray-200 */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            --radius-md: 0.5rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            
            --transition-speed: 0.3s;
        }

        /* Base Styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar Styling */
        .navbar-custom {
            background-color: var(--surface-color) !important;
            box-shadow: var(--shadow-sm);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-violet) !important;
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .navbar-brand i {
            font-size: 1.25rem;
        }

        /* Search Form Styling */
        .search-wrapper {
            position: relative;
            flex-grow: 1;
            max-width: 500px;
            margin: 0 2rem;
        }

        .search-input {
            width: 100% !important;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            transition: all var(--transition-speed) ease;
            font-size: 0.95rem;
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--primary-violet-light);
            border-color: var(--primary-violet);
            background-color: var(--surface-color);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Cart Button Styling */
        .btn-cart {
            background-color: var(--primary-violet);
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all var(--transition-speed) ease;
            box-shadow: var(--shadow-md);
        }

        .btn-cart:hover {
            background-color: var(--primary-violet-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            color: white;
        }
        
        .cart-badge {
            background-color: white;
            color: var(--primary-violet);
            border-radius: 9999px;
            padding: 0.15rem 0.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            margin-left: 0.25rem;
        }

        /* Layout Container */
        .main-container {
            padding: 3rem 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-title {
            font-weight: 700;
            font-size: 1.75rem;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 40px;
            height: 4px;
            background-color: var(--primary-violet);
            border-radius: 2px;
        }

        /* Product Card Styling */
        .product-card {
            background-color: var(--surface-color);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: all var(--transition-speed) ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-violet-light);
        }

        .product-img-wrapper {
            position: relative;
            padding: 1.5rem;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 240px;
            overflow: hidden;
        }

        .product-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
            mix-blend-mode: multiply; /* Removes white backgrounds nicely if any */
        }
        
        .product-card:hover .product-img {
            transform: scale(1.08);
        }

        .product-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-weight: 700;
            color: var(--text-main);
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .product-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
            flex-grow: 1;
        }

        .product-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            padding-top: 1.25rem;
        }

        .product-price {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary-violet);
            margin: 0;
        }

        .btn-add {
            background-color: var(--primary-violet);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            text-decoration: none;
            box-shadow: var(--shadow-sm);
        }

        .btn-add i {
            font-size: 1.1rem;
        }

        .btn-add:hover {
            background-color: var(--primary-violet-hover);
            color: white;
            text-decoration: none;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            width: 100%;
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--border-color);
            margin-bottom: 1rem;
        }

        /* Animation for Cart interaction */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .pop-anim {
            animation: pop 0.3s ease;
        }
        
        /* Layout Grid spacing */
        #listBarang {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            margin: 0;
        }
        
        /* Overriding bootstrap col classes since we use CSS Grid now */
        .grid-item {
            width: 100%;
        }

        @media (max-width: 768px) {
            .navbar-custom {
                padding: 0.75rem 1rem;
            }
            .navbar-custom .container-fluid {
                flex-wrap: wrap;
                gap: 0.75rem;
            }
            /* Row 1: Logo left, Cart right */
            .navbar-brand {
                order: 1;
                font-size: 1.25rem;
            }
            .btn-cart {
                order: 2;
                padding: 0.35rem 0.5rem;
                font-size: 0.75rem;
                box-shadow: none;
                gap: 0.25rem;
            }
            .btn-cart .cart-text {
                display: none;
            }
            .cart-badge {
                font-size: 0.7rem;
                padding: 0.05rem 0.35rem;
            }
            /* Row 2: Search full-width below */
            .search-wrapper {
                order: 3;
                margin: 0;
                width: 100%;
                max-width: 100%;
                flex-basis: 100%;
            }
            .search-input {
                padding: 0.6rem 1rem 0.6rem 2.25rem;
                font-size: 0.85rem;
            }
            .main-container {
                padding: 1.5rem 1rem;
            }
            .section-title {
                font-size: 1.35rem;
                margin-bottom: 1.5rem;
            }
            #listBarang {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }
            .product-img-wrapper {
                height: 180px;
            }
            .product-body {
                padding: 1rem;
            }
            .btn-add {
                width: 38px;
                height: 38px;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-custom">
        <div class="container-fluid max-w-1200 d-flex justify-content-between align-items-center flex-wrap">
            <a class="navbar-brand" href="#"><i class="fas fa-store"></i></a>
            
            <form class="form-inline search-wrapper" id="formItem">
                <i class="fas fa-search search-icon"></i>
                <input class="form-control search-input" type="search" placeholder="Search for premium gear..." id="keyword" aria-label="Search">
            </form>
            
            <button class="btn btn-cart" id="cart">
                <i class="fas fa-shopping-cart"></i> <span class="cart-text">Cart</span> <span class="cart-badge" id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <h2 class="section-title">Discover Products</h2>
        <div id="listBarang">
            <!-- Items will be injected here via JavaScript -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns" crossorigin="anonymous"></script>

    <script>
        // Array Data Barang
        // Format: [id, namaBarang, harga, deskripsi, linkGambar]
        var items = [
            ['001', 'Keyboard Logitek', 60000, 'Keyboard yang mantap untuk kantoran', 'produk/logitek.jpg'], 
            ['002', 'Keyboard MSI', 300000, 'Keyboard gaming MSI mekanik', 'produk/msi.jpg'],
            ['003', 'Mouse Genius', 50000, 'Mouse Genius biar lebih pinter', 'produk/genius.jpeg'],
            ['004', 'Mouse Jerry', 30000, 'Mouse yang disukai kucing', 'produk/jerry.jpg']
        ];

        // Variabel untuk counter keranjang
        var cartCount = 0;
        
        // Element HTML yang akan dimanipulasi
        var listBarang = document.getElementById("listBarang");
        var formItem = document.getElementById("formItem");
        var keywordInput = document.getElementById("keyword");
        var cartBadge = document.getElementById("cartCount");

        // Format angka ke format Rupiah (ex: 60.000)
        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID').format(angka);
        }

        // Fungsi untuk merender item ke HTML
        function renderItems(data) {
            var cardsHtml = "";
            
            // Jika tidak ada data yang ditemukan
            if (data.length === 0) {
                listBarang.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h4>Produk tidak ditemukan</h4>
                        <p>Ups! Coba gunakan kata kunci pencarian yang lain.</p>
                    </div>
                `;
                return;
            }

            for (var i = 0; i < data.length; i++) {
                var currentItem = data[i];
                cardsHtml += `
                    <div class="grid-item">
                        <div class="product-card">
                            <div class="product-img-wrapper">
                                <img src="${currentItem[4]}" class="product-img" alt="${currentItem[1]}">
                            </div>
                            <div class="product-body">
                                <h5 class="product-title">${currentItem[1]}</h5>
                                <p class="product-desc">${currentItem[3]}</p>
                                <div class="product-price-row">
                                    <p class="product-price">Rp ${formatRupiah(currentItem[2])}</p>
                                    <a href="#" class="btn-add addCart" data-id="${currentItem[0]}" title="Tambah ke keranjang">
                                        <i class="fas fa-cart-plus"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            listBarang.innerHTML = cardsHtml;

            // Menambahkan event listener ke tombol Tambahkan Keranjang
            var addCartButtons = document.querySelectorAll(".addCart");
            for (var i = 0; i < addCartButtons.length; i++) {
                addCartButtons[i].addEventListener("click", function(event) {
                    event.preventDefault(); // Mencegah scroll ke atas
                    
                    // Update counter
                    cartCount++;
                    cartBadge.innerText = cartCount;
                    
                    // Efek animasi pop pada badge cart
                    cartBadge.classList.remove("pop-anim");
                    void cartBadge.offsetWidth; // trigger reflow
                    cartBadge.classList.add("pop-anim");
                });
            }
        }

        // Jalankan fungsi saat halaman pertama kali dibuka untuk menampilkan semua data
        renderItems(items);

        // Event listener ke form pencarian untuk Filter secara real-time / saat submit
        formItem.addEventListener("submit", function(event) {
            event.preventDefault();
            filterData();
        });
        
        // Bonus: Membuat pencarian lebih interaktif (real-time saat mengetik)
        keywordInput.addEventListener("input", function() {
            filterData();
        });

        function filterData() {
            var keyword = keywordInput.value.toLowerCase();
            var filteredItems = items.filter(function(item) {
                var itemName = item[1].toLowerCase();
                return itemName.includes(keyword);
            });
            renderItems(filteredItems);
        }
    </script>
</body>
</html>
